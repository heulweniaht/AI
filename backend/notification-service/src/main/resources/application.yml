server:
  port: 8085

spring:
  application:
    name: NOTIFICATION-SERVICE

  # Cấu hình DB để lưu lịch sử gửi thông báo
  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: thai2003
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # Cấu hình Kafka Consumer
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group     # Tên của nhóm bưu điện
      auto-offset-reset: earliest      # Nếu sập, lúc bật lại sẽ đọc từ tin nhắn cũ nhất chưa xử lý
      enable-auto-commit: false        # TẮT tự động xác nhận (Dùng Manual ACK)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*" # Tin tưởng mọi cục dữ liệu JSON gửi đến

  # Cấu hình Mail (Dùng tạm Gmail SMTP để test)
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka